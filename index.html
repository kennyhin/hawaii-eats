<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memories</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=20260622w">
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
</head>
<body>

<button type="button" class="points-corner-badge hidden" id="creditBadge" title="Tap to open the Leaderboard"></button>

<header class="top">
  <h1>🌴 <span class="site-title-text">Memories</span> 🍜</h1>
  <p>Every place we've eaten, and the memories that came with it</p>
  <div class="tabs" id="tabs"></div>
  <div class="tabs tabs-sub" id="categoryTabs"></div>
</header>
<div class="wave-divider"></div>

<main>
  <div class="controls">
    <div class="search-row">
      <input type="search" id="searchBox" placeholder="Search places...">
      <button type="button" class="btn-filters" id="filtersToggleBtn">⚙️ Filter &amp; Sort</button>
      <div class="filters-panel hidden" id="filtersPanel">
        <label for="cuisineFilterSelect">Type</label>
        <select id="cuisineFilterSelect"></select>
        <label for="sortSelect">Sort</label>
        <select id="sortSelect">
          <option value="az">A → Z</option>
          <option value="za">Z → A</option>
          <option value="best">★ Best Rated</option>
          <option value="worst">★ Worst Rated</option>
        </select>
      </div>
    </div>
    <div class="menu-wrap">
      <button type="button" class="btn-menu" id="appMenuBtn">📋 Menu</button>
      <div class="app-menu-panel hidden" id="appMenuPanel">
        <div class="app-menu-heading">🍽️ Today's Menu</div>
        <button type="button" class="app-menu-item" id="leaderboardBtn">
          <span class="app-menu-item-icon">🏆</span>
          <span class="app-menu-item-label">Leaderboard</span>
          <span class="app-menu-dots"></span>
        </button>
        <button type="button" class="app-menu-item" id="randomizerBtn">
          <span class="app-menu-item-icon">🎲</span>
          <span class="app-menu-item-label">Randomize</span>
          <span class="app-menu-dots"></span>
        </button>
        <button type="button" class="app-menu-item" id="shopBtn">
          <span class="app-menu-item-icon">🛍️</span>
          <span class="app-menu-item-label">Shop</span>
          <span class="app-menu-dots"></span>
        </button>
        <button type="button" class="app-menu-item" id="miniGamesToggleBtn">
          <span class="app-menu-item-icon">🎮</span>
          <span class="app-menu-item-label">Mini Games</span>
          <span class="app-menu-dots"></span>
          <span class="app-menu-caret" id="miniGamesCaret">▾</span>
        </button>
        <div class="app-menu-submenu hidden" id="miniGamesSubmenu">
          <button type="button" class="app-menu-item app-menu-subitem" id="gameBtn">
            <span class="app-menu-item-icon">🎾</span>
            <span class="app-menu-item-label">Tennis</span>
            <span class="app-menu-dots"></span>
          </button>
          <button type="button" class="app-menu-item app-menu-subitem" id="blackjackBtn">
            <span class="app-menu-item-icon">🃏</span>
            <span class="app-menu-item-label">Blackjack</span>
            <span class="app-menu-dots"></span>
          </button>
          <button type="button" class="app-menu-item app-menu-subitem" id="rouletteBtn">
            <span class="app-menu-item-icon">🎡</span>
            <span class="app-menu-item-label">Roulette</span>
            <span class="app-menu-dots"></span>
          </button>
        </div>
      </div>
    </div>
    <button class="btn btn-primary btn-add-place" id="addPlaceBtn">+ Add a Place</button>
  </div>

  <button type="button" class="daily-reward-circle" id="dailyRewardBubble" title="Daily Reward — Claim +5 pts">
    <span class="daily-reward-icon" id="dailyRewardIcon">🎁</span>
  </button>

  <section class="activity-feed" id="activityFeed">
    <h3>📰 Recent Activity</h3>
    <div class="activity-list" id="activityList"></div>
  </section>

  <div class="count-line" id="countLine"></div>
  <div id="listContainer"></div>
</main>

<footer>Made with love for the family 💛</footer>

<!-- View Place Modal -->
<div class="overlay hidden" id="viewOverlay">
  <div class="modal" id="viewModal"></div>
</div>

<!-- Add/Edit Place Modal -->
<div class="overlay hidden" id="formOverlay">
  <div class="modal">
    <button class="modal-close" id="formCloseBtn">✕</button>
    <h2 id="formTitle">Add a Place</h2>
    <form class="place-form" id="placeForm">
      <input type="hidden" id="placeId">

      <div id="fAuthorField">
        <label for="fAuthor">Who's adding this? (+3 pts on the leaderboard)</label>
        <input type="text" id="fAuthor" placeholder="Your name">
      </div>

      <label for="fName">What's the name of the place?</label>
      <input type="text" id="fName" required>

      <label for="fCuisine" id="fCuisineLabel">What type of food is it?</label>
      <select id="fCuisine"></select>

      <div id="fDistanceField" style="display:none;">
        <label for="fDistance">Distance (roundtrip)</label>
        <input type="text" id="fDistance" placeholder="e.g. 4.2 miles">
      </div>

      <label for="fLocation">Where is it located?</label>
      <div class="lookup-row">
        <input type="text" id="fLocation" placeholder="e.g. Koko Marina, near our house">
        <button type="button" class="btn-lookup" id="findAddressBtn">📍 Find Address</button>
      </div>
      <div class="hint" id="addressHint"></div>

      <label for="fWebsite">Do they have a website?</label>
      <div class="lookup-row">
        <input type="url" id="fWebsite" placeholder="https://...">
        <button type="button" class="btn-lookup" id="findWebsiteBtn">🔍 Find Website</button>
      </div>
      <div class="hint">Opens a Google search in a new tab — copy the link back here.</div>

      <div class="modal-actions">
        <button type="submit" class="btn btn-primary">Save Place</button>
        <button type="button" class="btn btn-secondary" id="deletePlaceBtn" style="display:none;">Delete Place</button>
      </div>
    </form>
  </div>
</div>

<!-- Leaderboard Modal -->
<div class="overlay hidden" id="leaderboardOverlay">
  <div class="modal" id="leaderboardModal"></div>
</div>

<!-- Randomizer Modal -->
<div class="overlay hidden" id="randomizerOverlay">
  <div class="modal" id="randomizerModal"></div>
</div>

<!-- Shop Modal -->
<div class="overlay hidden" id="shopOverlay">
  <div class="modal modal-wide" id="shopModal"></div>
</div>

<!-- Moderator Modal -->
<div class="overlay hidden" id="moderatorOverlay">
  <div class="modal" id="moderatorModal"></div>
</div>

<!-- Tennis Game Modal -->
<div class="overlay hidden" id="gameOverlay">
  <div class="modal modal-wide" id="gameModal"></div>
</div>

<!-- Blackjack Modal -->
<div class="overlay hidden" id="blackjackOverlay">
  <div class="modal modal-wide" id="blackjackModal"></div>
</div>

<!-- Roulette Modal -->
<div class="overlay hidden" id="rouletteGameOverlay">
  <div class="modal modal-wide" id="rouletteGameModal"></div>
</div>

<!-- Lightbox -->
<div class="overlay hidden" id="lightboxOverlay">
  <button class="modal-close" id="lightboxCloseBtn" style="position:fixed; top:20px; right:20px;">✕</button>
  <div class="lightbox-stack">
    <button type="button" class="lightbox-nav-btn lightbox-prev-btn" id="lightboxPrevBtn">‹</button>
    <img class="lightbox-img" id="lightboxImg" src="" alt="">
    <button type="button" class="lightbox-nav-btn lightbox-next-btn" id="lightboxNextBtn">›</button>
    <a class="lightbox-website-link" id="lightboxWebsiteLink" target="_blank" rel="noopener noreferrer" style="display:none;">🔗 Visit Website</a>
  </div>
</div>

<!-- Discreet moderator entry point — intentionally tiny and tucked in a corner -->
<button type="button" class="moderator-corner-btn" id="moderatorBtn" title="Moderator">🔒</button>

<!-- Bump the ?v= on these whenever app.js/styles.css/hawaii_seed.js change, so
     everyone's browser fetches the new version instead of a stale cached copy. -->
<script src="hawaii_seed.js?v=20260622w"></script>
<script type="module" src="app.js?v=20260622w"></script>
</body>
</html>
